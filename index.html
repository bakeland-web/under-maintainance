<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakoors Baking - Coming Soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            background-image: url('./image.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            position: relative;
        }
        
        /* Load the actual GIF background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: "./image.gif";
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }
        
        .content {
            text-align: center;
            color: #ffffff;
            text-shadow: 
                3px 3px 0px #000000,
                -1px -1px 0px #000000,
                1px -1px 0px #000000,
                -1px 1px 0px #000000,
                1px 1px 0px #000000;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 0;
            border: 4px solid #ffffff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            }
            to {
                box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
            }
        }
        
        .title {
            font-size: clamp(24px, 5vw, 48px);
            margin-bottom: 30px;
            color: #FFD700;
            text-shadow: 
                3px 3px 0px #000000,
                -1px -1px 0px #000000,
                1px -1px 0px #000000,
                -1px 1px 0px #000000,
                1px 1px 0px #000000;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .subtitle {
            font-size: clamp(12px, 2.5vw, 20px);
            margin-bottom: 20px;
            color: #00FFFF;
            animation: blink 2s linear infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .quest-text {
            font-size: clamp(10px, 2vw, 16px);
            color: #90EE90;
            line-height: 1.8;
            animation: fadeInOut 3s ease-in-out infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        
        /* Floating particles effect */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #FFD700;
            animation: float 4s linear infinite;
            box-shadow: 0 0 12px 4px #FFD700, 0 0 24px 8px #fff70088;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10px) rotate(360deg);
                opacity: 0;
            }
        }
        
        .particle:nth-child(1)  { left: 7%;  animation-delay: 0.2s;  animation-duration: 3.8s; }
        .particle:nth-child(2)  { left: 18%; animation-delay: 1.1s;  animation-duration: 4.3s; }
        .particle:nth-child(3)  { left: 27%; animation-delay: 0.6s;  animation-duration: 3.5s; }
        .particle:nth-child(4)  { left: 39%; animation-delay: 2.0s;  animation-duration: 4.7s; }
        .particle:nth-child(5)  { left: 44%; animation-delay: 1.7s;  animation-duration: 3.9s; }
        .particle:nth-child(6)  { left: 53%; animation-delay: 0.9s;  animation-duration: 4.1s; }
        .particle:nth-child(7)  { left: 62%; animation-delay: 2.8s;  animation-duration: 3.6s; }
        .particle:nth-child(8)  { left: 71%; animation-delay: 1.3s;  animation-duration: 4.5s; }
        .particle:nth-child(9)  { left: 81%; animation-delay: 0.4s;  animation-duration: 3.7s; }
        .particle:nth-child(10) { left: 56%; animation-delay: 2.2s;  animation-duration: 4.2s; }
        .particle:nth-child(11) { left: 68%; animation-delay: 0.7s;  animation-duration: 3.4s; }
        .particle:nth-child(12) { left: 77%; animation-delay: 1.9s;  animation-duration: 4.6s; }
        .particle:nth-child(13) { left: 88%; animation-delay: 0.3s;  animation-duration: 3.8s; }
    </style>
</head>
<body>
    <!-- Floating particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    
    <div class="content">
        <div class="title">BAKOORS BAKING</div>
        <div class="subtitle">STAY TUNED</div>
        <div class="quest-text">NEW QUESTS COMING SOON</div>
    </div>
</body>
</html>
